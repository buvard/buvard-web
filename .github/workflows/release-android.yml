name: Release Android

# Trigger : push d'un tag v*.*.* (cree par `npm run version:patch --push` ou
# manuellement via `git tag v1.2.3 && git push --tags`).
on:
  push:
    tags:
      - 'v*.*.*'

# Permission ecriture sur le repo pour creer la Github Release.
permissions:
  contents: write

jobs:
  build:
    name: Build APK + create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Capacitor CLI v8+ exige Node >= 22.
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          # Capacitor v8 + Capacitor Android compilent en Java 21.
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Decode keystore from secret
        # Le keystore est stocke en base64 dans Github Secrets (limite a 65k char).
        # On le decode dans un fichier qui sera reference par BUVARD_KEYSTORE_PATH.
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/buvard-release.keystore
          echo "BUVARD_KEYSTORE_PATH=$RUNNER_TEMP/buvard-release.keystore" >> "$GITHUB_ENV"

      - name: Build signed release APK (prod flavor)
        env:
          BUVARD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUVARD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          BUVARD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleProdRelease --no-daemon

      - name: Rename APK
        # Nom standardise : buvard-v1.2.3.apk pour faciliter le fetch cote front.
        run: |
          APK_SRC=$(find android/app/build/outputs/apk/prod/release -name "*.apk" | head -n 1)
          if [ -z "$APK_SRC" ]; then
            echo "Aucun APK trouve apres build"
            exit 1
          fi
          mkdir -p artifacts
          cp "$APK_SRC" "artifacts/buvard-v${{ steps.version.outputs.version }}.apk"
          ls -lh artifacts/

      - name: Create Github Release
        uses: softprops/action-gh-release@v2
        with:
          name: Buvard v${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/buvard-v${{ steps.version.outputs.version }}.apk
