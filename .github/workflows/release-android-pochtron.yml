name: Release Android (Pochtron)

# Trigger : tag pochtron-v*.*.* (cree par `npm run version:patch:pochtron --push`).
# L'APK pochtron est distribue aux testeurs externes. Il coexiste avec l'APK
# prod sur le meme telephone (app ID different : app.buvard.pochtron vs
# app.buvard). Utilise pour tester avant la prod.
on:
  push:
    tags:
      - 'pochtron-v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build APK Pochtron + create Pre-Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        # tag = "pochtron-v1.3.2" -> version = "1.3.2"
        run: echo "version=${GITHUB_REF_NAME#pochtron-v}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle (pochtron)
        # Mode pochtron : utilise .env.pochtron -> API api-pochtron.buvard.app
        run: npm run build:pochtron

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Decode keystore from secret
        # Meme keystore que prod : la signature de l'app est independante de
        # l'env. Ce qui differe c'est l'applicationId (suffix .pochtron) et
        # le bundle web (API pochtron).
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/buvard-release.keystore
          echo "BUVARD_KEYSTORE_PATH=$RUNNER_TEMP/buvard-release.keystore" >> "$GITHUB_ENV"

      - name: Build signed pochtron APK
        env:
          BUVARD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUVARD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          BUVARD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assemblePochtronRelease --no-daemon

      - name: Rename APK
        run: |
          APK_SRC=$(find android/app/build/outputs/apk/pochtron/release -name "*.apk" | head -n 1)
          if [ -z "$APK_SRC" ]; then
            echo "Aucun APK pochtron trouve apres build"
            exit 1
          fi
          mkdir -p artifacts
          cp "$APK_SRC" "artifacts/buvard-pochtron-v${{ steps.version.outputs.version }}.apk"
          ls -lh artifacts/

      - name: Create Github Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          name: Buvard Pochtron v${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          # prerelease = true : les pre-releases n'apparaissent PAS comme
          # "latest release" sur la page Releases. La page /download web qui
          # fetch /releases/latest ne propose donc PAS la pochtron.
          prerelease: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/buvard-pochtron-v${{ steps.version.outputs.version }}.apk
