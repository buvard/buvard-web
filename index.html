<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#8B2635" />
    <meta name="description" content="Partage tes dégustations d'alcools avec tes potes." />

    <!-- PWA : manifest + meta Apple. Sans ces lignes la PWA n'est pas
         installable. Pour iOS, "apple-mobile-web-app-capable" est ce qui
         permet l'ouverture en standalone une fois ajoute a l'ecran d'accueil.
         WebP icones supportes par Safari iOS 14+. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.webp" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Buvard" />

    <title>Buvard — partage tes alcools</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
