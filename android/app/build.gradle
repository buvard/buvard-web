apply plugin: 'com.android.application'

android {
    namespace = "app.buvard"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "app.buvard"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 2
        versionName "1.3.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    // Signing release : 3 niveaux de fallback
    //   1. Github Action / CI : variables d'env BUVARD_KEYSTORE_PATH +
    //      BUVARD_KEYSTORE_PASSWORD + BUVARD_KEY_ALIAS + BUVARD_KEY_PASSWORD
    //   2. Local : fichier keystore.properties a la racine android/ (gitignore)
    //      contenant storeFile=..., storePassword=..., keyAlias=..., keyPassword=...
    //   3. Fallback : keystore debug — APK installable mais PAS distribuable
    //      (avertissement console au build).
    signingConfigs {
        release {
            def envKeystorePath = System.getenv("BUVARD_KEYSTORE_PATH")
            def localProps = new Properties()
            def localPropsFile = rootProject.file("keystore.properties")
            if (localPropsFile.exists()) {
                localProps.load(new FileInputStream(localPropsFile))
            }

            if (envKeystorePath != null && file(envKeystorePath).exists()) {
                // CI : keystore decode depuis Github Secrets
                storeFile file(envKeystorePath)
                storePassword System.getenv("BUVARD_KEYSTORE_PASSWORD")
                keyAlias System.getenv("BUVARD_KEY_ALIAS")
                keyPassword System.getenv("BUVARD_KEY_PASSWORD")
            } else if (localProps.containsKey("storeFile")) {
                // Local : keystore.properties
                storeFile rootProject.file(localProps["storeFile"])
                storePassword localProps["storePassword"]
                keyAlias localProps["keyAlias"]
                keyPassword localProps["keyPassword"]
            } else {
                // Fallback : keystore debug. Marche pour tester en local
                // mais l'APK NE DOIT PAS etre distribue.
                println "⚠️  Pas de keystore release configure — utilise debug.keystore."
                println "   APK non distribuable. Cf android/app/build.gradle pour setup."
                storeFile file("${System.getProperty('user.home')}/.android/debug.keystore")
                storePassword 'android'
                keyAlias 'androiddebugkey'
                keyPassword 'android'
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }
    // Trois environnements coexistant sur l'appareil :
    //   prod    -> app.buvard         ("Buvard")
    //   staging -> app.buvard.staging ("Buvard Staging")
    //   local   -> app.buvard.local   ("Buvard Local")
    flavorDimensions "env"
    productFlavors {
        prod {
            dimension "env"
            resValue "string", "app_name", "Buvard"
        }
        staging {
            dimension "env"
            applicationIdSuffix ".staging"
            resValue "string", "app_name", "Buvard Staging"
        }
        local {
            dimension "env"
            applicationIdSuffix ".local"
            resValue "string", "app_name", "Buvard Local"
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
